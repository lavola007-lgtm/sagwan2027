  .note{background:#fffbeb;border-left:4px solid var(--gold);border-radius:0 10px 10px 0;padding:12px 15px;font-size:12.5px;color:#92590b;line-height:1.6;margin-top:16px}.note b{font-weight:800}

      "<b>종합선발 30%로 수능 비중 최고</b> — 수능 약하면 불리",
      "인성검사(MMPI-2 567문항·NEO 211문항) <b>미시행 시 불합격</b>",
      "면접 1개 분과 40% 미만 또는 총점 60% 미만 시 합·불 판정",
      "2차 시험 <b>개인별 2일</b>로 변경(2027)",
      "남자 14명 모집(소수)"],
    schedule:{balpyo1:"8.14(금)", ichassi:"9.14(월)~9.30(수)", woomseon:"11.6(금)", jonghap:"12.21(월)"},
    comp:"40.3 : 1" }
};
const ORDER=["army","navy","air","nurse"];

function bars(g,color){
  return `<div class="bgroup"><div class="blab">${g.label} <span>· ${g.sub}</span></div>`+
    g.items.map(([k,p])=>`<div class="bar"><div class="n">${k}</div><div class="track"><div class="fill" style="width:${p}%;background:${color}"></div></div><div class="p">${p}%</div></div>`).join("")+`</div>`;
}
function schoolPanel(key){
  const s=SCHOOLS[key];
  const flow=s.flow.map((f,i)=>`<div class="step">${f.n}<small>${f.s}</small></div>${i<s.flow.length-1?'<span class="arr">›</span>':''}`).join("");
  return `<div class="panel" id="p-${key}" style="--c:${s.c};--cd:${s.cd};--cl:${s.cl}">
    <div class="shead"><span class="tag">2027학년도</span><h2>${s.name}</h2><div class="head">${s.head}</div>
      <div class="rec"><b>자료 요약 ·</b> ${s.rec}</div></div>

    <div class="sec"><div class="sh"><div class="ix">A</div><h3>포지셔닝 — 누구에게 권하나</h3></div>
      <div class="stats">
        <div class="stat"><div class="k">2027 모집인원</div><div class="v">${s.intake.total}<small>명</small></div><div class="s">${s.intake.mf}</div></div>
        <div class="stat"><div class="k">종합선발(수능)</div><div class="v">${s.jong}</div><div class="s">나머지는 수능 미반영</div></div>
        <div class="stat"><div class="k">계열비율 남 / 여</div><div class="v" style="font-size:18px">${s.intake.mRatio}<br>${s.intake.fRatio}</div><div class="s">인문 : 자연</div></div>
      </div></div>

    <div class="sec"><div class="sh"><div class="ix">B</div><h3>선발 구조 — 한 번 접수 → 자동 이월</h3><span class="tip">${s.ratio}</span></div>
      <div class="flow">${flow}</div><div class="exc">${s.exc}</div></div>

    <div class="sec"><div class="sh"><div class="ix">C</div><h3>당락 배점 — 무엇이 가르나</h3><span class="tip">전형별 100% 환산</span></div>
      ${s.baejeom.map(g=>bars(g,s.c)).join("")}<div class="tie">📌 ${s.suneung}</div></div>

    <div class="sec"><div class="sh"><div class="ix">D</div><h3>지도 포인트</h3></div>
      <ul class="clean">
        <li><b>배점상 결정요소:</b> ${s.key}</li>
        <li><b>1차 합격 배수:</b> ${s.chasu}</li>
      </ul>
      <div class="tie">⚖ 동점자 우선순위 — ${s.tie}</div>
      <div class="derived">※ 이 칸은 자료의 배점·동점 규칙에서 도출한 정리입니다.</div></div>

    <div class="sec traps"><div class="sh"><div class="ix">E</div><h3>필수 확인 · 탈락 트랩</h3><span class="tip" style="color:#b91c1c">점수 좋아도 떨어지는 함정</span></div>
      <ul class="trap">${s.traps.map(t=>`<li><span>${t}</span></li>`).join("")}</ul></div>

    <div class="sec"><div class="sh"><div class="ix">F</div><h3>일정 · 경쟁률 · 합격선</h3></div>
      <div class="mini">
        <div class="row"><span>원서접수</span><span class="w">${COMMON.wonseo}</span></div>
        <div class="row"><span>1차 시험</span><span class="w">${COMMON.ilchaDate}</span></div>
        <div class="row"><span>1차 합격 발표</span><span class="w">${s.schedule.balpyo1}</span></div>
        <div class="row"><span>2차 시험</span><span class="w">${s.schedule.ichassi}</span></div>
        <div class="row"><span>우선선발 발표</span><span class="w">${s.schedule.woomseon}</span></div>
        <div class="row"><span>종합선발 발표</span><span class="w">${s.schedule.jonghap}</span></div>
      </div>
      <div class="foot-stats">
        <div class="fs"><div class="k">2026 경쟁률</div><div class="v">${s.comp}</div></div>
        <div class="fs" style="flex:2"><div class="k">합격선(비공식 참고)</div><div class="v" style="font-size:13px;font-weight:600">우선 내신 3~4등급대 / 종합 수능 국숭세단 라인</div></div>
      </div></div>
  </div>`;
}
function comparePanel(){
  const rows=ORDER.map(k=>{const s=SCHOOLS[k];
    return `<tr><td class="lbl"><span class="badge" style="background:${s.c}"></span>${s.name}</td>
      <td class="big" style="color:${s.cd}">${s.intake.total}명</td><td>${s.jong}</td>
      <td>${s.chasu.indexOf(' / ')>-1?s.chasu.replace(' / ','<br>'):s.chasu}</td>
      <td>${s.schedule.ichassi}</td><td class="big" style="color:${s.cd}">${s.comp}</td></tr>`;}).join("");
  return `<div class="panel on" id="p-compare">
    <div class="cmp"><table>
      <tr><th>학교</th><th>모집인원</th><th>종합선발<br>(수능)</th><th>1차 합격 배수</th><th>2차 시험(2026)</th><th>2026 경쟁률</th></tr>${rows}
    </table></div>
    <div class="note">${COMMON.ilcha}</div>
    <div class="note" style="border-left-color:#dc2626;background:#fef2f3;color:#9b1c1c"><b>공통 탈락 트랩</b> — ① 수능 선택과목은 지원 계열과 일치(자연 지원자가 사탐 응시 시 종합선발 제외) ② 오래달리기 기준 미달 시 불합격 ③ 교정시력 0.6 미만 주의 ④ 제출서류 가족관계증명서(상세) 추가.</div>
    <div class="src">근거: ‘입시사딸라 — 사관학교 입시의 모든 것(2027)’ 책자 수록 내용만 사용. 기수·캠퍼스 위치 등 책자에 없는 정보는 제외. 날짜는 2026년 실제 일정(2027학년도 입학). 합격선은 책자의 비공식 참고치로 매년 변동.</div>
  </div>`;
}
const tabsEl=document.getElementById("tabs"), mainEl=document.getElementById("main");
const TABS=[{k:"compare",label:"전체비교",c:"#0f172a"}].concat(ORDER.map(k=>({k,label:SCHOOLS[k].name.replace("사관학교","").replace("국군간호","간호"),c:SCHOOLS[k].c})));
tabsEl.innerHTML=TABS.map((t,i)=>`<button class="tab${i===0?' on':''}" data-k="${t.k}" style="--tc:${t.c}">${t.label}</button>`).join("");
mainEl.innerHTML=comparePanel()+ORDER.map(schoolPanel).join("");
tabsEl.addEventListener("click",e=>{const b=e.target.closest(".tab");if(!b)return;
  document.querySelectorAll(".tab").forEach(x=>x.classList.remove("on"));
  document.querySelectorAll(".panel").forEach(x=>x.classList.remove("on"));
  b.classList.add("on");document.getElementById("p-"+b.dataset.k).classList.add("on");
  window.scrollTo({top:0,behavior:"smooth"});});
</script>
</body>
</html>
